<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jul's Closet</title>
<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" href="logo.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;}
.app{max-width:480px;margin:0 auto;padding:0 0 4rem;}

/* Main tabs - wardrobe vs beauty vs wishlist */
.main-tabs{display:flex;border-bottom:0.5px solid #e0e0e0;background:#fff;position:sticky;top:0;z-index:10;}
.main-tab{flex:1;padding:12px 0;font-size:13px;font-weight:500;text-align:center;cursor:pointer;color:#aaa;border-bottom:2px solid transparent;background:transparent;border-top:none;border-left:none;border-right:none;}
.main-tab.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a;}

.section{padding:1rem 1rem 0;}
h1{font-size:20px;font-weight:500;}
.subtitle{font-size:13px;color:#888;margin-top:2px;margin-bottom:1rem;}
.search input{width:100%;padding:10px 14px;border-radius:10px;border:0.5px solid #ddd;font-size:14px;background:#fff;color:#1a1a1a;outline:none;}
.search input:focus{border-color:#999;}

.cat-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0.75rem -1rem 0;padding:0 1rem;}
.cat-scroll::-webkit-scrollbar{display:none;}
.tabs{display:flex;gap:6px;width:max-content;padding-bottom:0.5rem;}
.tab{padding:5px 14px;border-radius:20px;border:0.5px solid #ddd;font-size:13px;cursor:pointer;background:transparent;color:#666;white-space:nowrap;}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.subcat-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -1rem;padding:0 1rem;}
.subcat-scroll::-webkit-scrollbar{display:none;}
.subtabs{display:flex;gap:6px;width:max-content;padding-bottom:0.75rem;}
.subtab{padding:4px 12px;border-radius:20px;border:0.5px solid #e0e0e0;font-size:12px;cursor:pointer;background:transparent;color:#999;white-space:nowrap;}
.subtab.active{background:#555;color:#fff;border-color:#555;}

.count{font-size:12px;color:#aaa;margin:0.5rem 0;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 1rem;}
.card{background:#fff;border:0.5px solid #e8e8e8;border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color 0.15s;position:relative;}
.card:hover{border-color:#bbb;}
.card-img{width:100%;aspect-ratio:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.card-body{padding:10px 12px 12px;}
.card-brand{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;}
.card-name{font-size:13px;font-weight:500;color:#1a1a1a;margin:2px 0 4px;line-height:1.3;}
.card-meta{font-size:11px;color:#aaa;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;margin-top:5px;}
.b-outerwear{background:#fff3e0;color:#b36200;}
.b-top{background:#e8f5e9;color:#2e7d32;}
.b-bottom{background:#e3f0ff;color:#1a5fa8;}
.b-dress{background:#fce4ec;color:#ad1457;}
.b-shoes{background:#e6f7ee;color:#1a7a42;}
.b-bag{background:#ffe8e8;color:#a82020;}
.b-jewelry{background:#f3e5f5;color:#6a1b9a;}
.b-accessory{background:#e0f7fa;color:#00695c;}
.b-underwear{background:#fafafa;color:#666;border:0.5px solid #ddd;}
.b-sport{background:#e8eaf6;color:#283593;}
.b-other{background:#f5f5f5;color:#666;}

/* Wishlist heart badge on card */
.wish-badge{position:absolute;top:8px;right:8px;background:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 1px 4px rgba(0,0,0,0.12);}

/* Priority badge */
.priority-high{background:#ffeaea;color:#c0392b;padding:2px 8px;border-radius:20px;font-size:10px;margin-top:5px;display:inline-block;}
.priority-med{background:#fff8e1;color:#b8860b;padding:2px 8px;border-radius:20px;font-size:10px;margin-top:5px;display:inline-block;}
.priority-low{background:#f0f0f0;color:#666;padding:2px 8px;border-radius:20px;font-size:10px;margin-top:5px;display:inline-block;}

.add-btn{width:calc(100% - 2rem);margin:1.5rem 1rem 0;padding:14px;border-radius:12px;border:1px dashed #ccc;background:transparent;color:#888;font-size:14px;cursor:pointer;display:block;}
.add-btn:hover{background:#fff;color:#333;}

/* Sheets */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:50;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.sheet-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 1.25rem;}
.sheet h2{font-size:17px;font-weight:500;margin-bottom:1.25rem;}
.field{margin-bottom:12px;}
.field label{font-size:11px;color:#888;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.4px;}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border-radius:9px;border:0.5px solid #ddd;font-size:14px;background:#f9f9f9;color:#1a1a1a;font-family:inherit;outline:none;}
.field textarea{resize:vertical;min-height:64px;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#999;background:#fff;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.img-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.img-box{border-radius:12px;border:1.5px dashed #ddd;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#f9f9f9;position:relative;overflow:hidden;aspect-ratio:1;width:100%;}
.img-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.img-box-label{font-size:11px;color:#aaa;margin-top:4px;text-align:center;}
.img-box input{display:none;}

.ai-scan-btn{width:100%;padding:11px;border-radius:10px;border:0.5px solid #ddd;background:#f9f9f9;color:#333;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;}
.ai-scan-btn:active{background:#f0f0f0;}
.ai-loading{display:none;font-size:13px;color:#888;text-align:center;padding:8px;margin-bottom:8px;}

.btn-row{display:flex;gap:8px;margin-top:1.25rem;}
.btn-cancel{flex:1;padding:12px;border-radius:10px;border:0.5px solid #ddd;background:transparent;color:#666;font-size:14px;cursor:pointer;}
.btn-save{flex:2;padding:12px;border-radius:10px;border:none;background:#1a1a1a;color:#fff;font-size:14px;cursor:pointer;font-weight:500;}

/* Detail sheet */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:50;align-items:flex-end;justify-content:center;}
.detail-overlay.open{display:flex;}
.detail-sheet{background:#fff;border-radius:20px 20px 0 0;padding:0 0 2rem;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.detail-img{width:100%;aspect-ratio:4/3;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden;}
.detail-img img{width:100%;height:100%;object-fit:cover;}
.detail-body{padding:1.25rem;}
.detail-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem;}
.close-x{width:30px;height:30px;border-radius:50%;background:#f0f0f0;border:none;font-size:16px;cursor:pointer;color:#666;flex-shrink:0;}
.d-brand{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;}
.d-name{font-size:19px;font-weight:500;color:#1a1a1a;margin:3px 0 1rem;}
.d-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:0.5px solid #f0f0f0;font-size:13px;gap:12px;}
.d-row:last-child{border-bottom:none;}
.d-label{color:#aaa;flex-shrink:0;}
.d-val{color:#1a1a1a;font-weight:500;text-align:right;}
.d-notes{margin-top:12px;padding:12px;background:#f9f9f7;border-radius:10px;font-size:13px;color:#666;line-height:1.6;}
.detail-actions{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;}
.edit-btn{flex:1;padding:11px;border-radius:10px;border:0.5px solid #ddd;background:transparent;color:#333;font-size:14px;cursor:pointer;}
.del-btn{flex:1;padding:11px;border-radius:10px;border:none;background:#fff0f0;color:#c0392b;font-size:13px;cursor:pointer;}
.move-btn{width:100%;padding:12px;border-radius:10px;border:none;background:#1a1a1a;color:#fff;font-size:14px;cursor:pointer;font-weight:500;margin-top:4px;}
.price-btn{width:100%;padding:11px;border-radius:10px;border:0.5px solid #f4b8c8;background:#fff5f8;color:#c0397a;font-size:13px;cursor:pointer;margin-top:4px;}

/* Price result sheet */
.price-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:60;align-items:flex-end;justify-content:center;}
.price-overlay.open{display:flex;}
.price-sheet{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;}
.price-result{font-size:14px;line-height:1.8;color:#333;white-space:pre-wrap;}

.img-tabs{display:flex;gap:6px;padding:10px 1.25rem 0;}
.img-tab-btn{flex:1;padding:7px;border-radius:8px;font-size:12px;cursor:pointer;transition:all 0.15s;}
.img-tab-active{border:0.5px solid #1a1a1a;background:#1a1a1a;color:#fff;}
.img-tab-inactive{border:0.5px solid #ddd;background:transparent;color:#aaa;}

.empty{grid-column:span 2;text-align:center;padding:3rem 1rem;color:#bbb;font-size:14px;}
.scan-row{display:flex;gap:8px;margin-bottom:8px;}
.scan-row .ai-scan-btn{flex:1;margin-bottom:0;}

/* Beauty status */
.status-bar{display:flex;gap:6px;padding:0.5rem 1rem 0;flex-wrap:wrap;}
.status-btn{padding:5px 14px;border-radius:20px;border:0.5px solid #ddd;font-size:12px;cursor:pointer;background:transparent;color:#666;white-space:nowrap;}
.status-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.s-using{background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:20px;font-size:10px;display:inline-block;margin-top:4px;}
.s-stock{background:#fff8e1;color:#b8860b;padding:2px 8px;border-radius:20px;font-size:10px;display:inline-block;margin-top:4px;}
.s-done{background:#f5f5f5;color:#888;padding:2px 8px;border-radius:20px;font-size:10px;display:inline-block;margin-top:4px;}
.repurchase-btn{width:100%;padding:11px;border-radius:10px;border:0.5px solid #e8f5e9;background:#f0faf0;color:#2e7d32;font-size:13px;cursor:pointer;margin-top:4px;}
</style>
</head>
<body>

<!-- Main tabs -->
<div class="main-tabs">
  <button class="main-tab active" id="tab-wardrobe" onclick="switchMain('wardrobe')">👗 衣橱</button>
  <button class="main-tab" id="tab-beauty" onclick="switchMain('beauty')">💄 美妆</button>
  <button class="main-tab" id="tab-wishlist" onclick="switchMain('wishlist')">🤍 心愿单</button>
</div>

<!-- Wardrobe section -->
<div id="section-wardrobe">
  <div class="section">
    <div class="search"><input type="text" id="search-w" placeholder="搜索品牌、材质、单品..." oninput="render()"></div>
  </div>
  <div class="cat-scroll" style="padding:0 1rem;"><div class="tabs" id="tabs-w"></div></div>
  <div class="subcat-scroll" id="subcatScroll-w" style="display:none;padding:0 1rem;"><div class="subtabs" id="subtabs-w"></div></div>
  <div class="section"><p class="count" id="count-w"></p></div>
  <div class="grid" id="grid-w"></div>
  <button class="add-btn" onclick="openAdd('wardrobe')">＋ 添加单品</button>
</div>

<!-- Beauty section -->
<div id="section-beauty" style="display:none;">
  <div class="section">
    <div class="search"><input type="text" id="search-b" placeholder="搜索品牌、产品名..." oninput="render()"></div>
  </div>
  <div class="status-bar">
    <button class="status-btn active" id="sb-current" onclick="setBeautyStatus('current')">使用中+库存</button>
    <button class="status-btn" id="sb-done" onclick="setBeautyStatus('done')">已用完</button>
    <button class="status-btn" id="sb-all" onclick="setBeautyStatus('all')">全部</button>
  </div>
  <div class="cat-scroll" style="padding:0 1rem;"><div class="tabs" id="tabs-b"></div></div>
  <div class="subcat-scroll" id="subcatScroll-b" style="display:none;padding:0 1rem;"><div class="subtabs" id="subtabs-b"></div></div>
  <div class="section"><p class="count" id="count-b"></p></div>
  <div class="grid" id="grid-b"></div>
  <button class="add-btn" onclick="openAdd('beauty')">＋ 添加美妆护肤</button>
</div>

<!-- Wishlist section -->
<div id="section-wishlist" style="display:none;">
  <div class="section">
    <div class="search"><input type="text" id="search-wl" placeholder="搜索品牌、单品..." oninput="render()"></div>
  </div>
  <div class="status-bar">
    <button class="status-btn active" id="wl-all" onclick="setWishlistPriority('all')">全部</button>
    <button class="status-btn" id="wl-高" onclick="setWishlistPriority('高')">🔴 必买</button>
    <button class="status-btn" id="wl-中" onclick="setWishlistPriority('中')">🟡 很想要</button>
    <button class="status-btn" id="wl-低" onclick="setWishlistPriority('低')">⚪ 随缘</button>
  </div>
  <div class="section"><p class="count" id="count-wl"></p></div>
  <div class="grid" id="grid-wl"></div>
  <button class="add-btn" onclick="openAdd('wishlist')">＋ 添加心愿单</button>
</div>

<!-- Add/Edit sheet -->
<div class="overlay" id="addModal">
<div class="sheet">
  <div class="sheet-handle"></div>
  <h2 id="modal-title">添加单品</h2>

  <div class="img-row">
    <div class="img-box" onclick="document.getElementById('imgInput').click()">
      <img id="imgPreview" style="display:none">
      <span style="font-size:22px;">🛍️</span>
      <span class="img-box-label">官方图</span>
      <input type="file" id="imgInput" accept="image/*" onchange="handleImg(event,'imgPreview','official')">
    </div>
    <div class="img-box" onclick="document.getElementById('outfitInput').click()">
      <img id="outfitPreview" style="display:none">
      <span style="font-size:22px;">🪞</span>
      <span class="img-box-label">上身图</span>
      <input type="file" id="outfitInput" accept="image/*" onchange="handleImg(event,'outfitPreview','outfit')">
    </div>
  </div>

  <button class="ai-scan-btn" onclick="document.getElementById('brandScanInput').click()">
    📸 拍照或上传截图，AI自动识别信息
    <input type="file" id="brandScanInput" accept="image/*" style="display:none" onchange="scanBrand(event)">
  </button>
  <div class="scan-row">
    <button class="ai-scan-btn" onclick="document.getElementById('scan1Input').click()">
      🏷️ 洗水标正面（材质/尺码）
      <input type="file" id="scan1Input" accept="image/*" capture="environment" style="display:none" onchange="scanLabel1(event)">
    </button>
    <button class="ai-scan-btn" onclick="document.getElementById('scan2Input').click()">
      🧺 洗水标背面（洗涤）
      <input type="file" id="scan2Input" accept="image/*" capture="environment" style="display:none" onchange="scanLabel2(event)">
    </button>
  </div>
  <div class="ai-loading" id="aiLoading">⏳ AI识别中，请稍候...</div>

  <div class="field-row">
    <div class="field"><label>大类</label>
      <select id="f-bigcat" onchange="updateSubcat()">
        <option value="大衣/皮草">大衣/皮草</option>
        <option value="外套">外套</option>
        <option value="上装">上装</option>
        <option value="下装">下装</option>
        <option value="裙子">裙子</option>
        <option value="鞋子">鞋子</option>
        <option value="配饰">配饰</option>
        <option value="首饰">首饰</option>
        <option value="内衣/睡衣">内衣/睡衣</option>
        <option value="运动">运动</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="field"><label>小类</label><select id="f-subcat"></select></div>
  </div>

  <div class="field" id="f-status-row" style="display:none;">
    <label>使用状态</label>
    <select id="f-status">
      <option value="using">🟢 使用中</option>
      <option value="stock">🟡 库存中</option>
      <option value="done">🔴 已用完</option>
    </select>
  </div>
  <div class="field" id="f-repurchase-row" style="display:none;">
    <label>会回购吗？</label>
    <select id="f-repurchase">
      <option value="">未评价</option>
      <option value="yes">⭐ 会回购</option>
      <option value="no">❌ 不回购</option>
    </select>
  </div>

  <!-- Wishlist only: priority -->
  <div class="field" id="f-priority-row" style="display:none;">
    <label>优先级</label>
    <select id="f-priority">
      <option value="高">🔴 必买</option>
      <option value="中">🟡 很想要</option>
      <option value="低">⚪ 随缘</option>
    </select>
  </div>
  <div class="field" id="f-cattag-row" style="display:none;">
    <label>品类</label>
    <select id="f-cattag">
      <option value="👗 衣服">👗 衣服</option>
      <option value="👠 鞋子">👠 鞋子</option>
      <option value="👜 鞋包配饰">👜 鞋包配饰</option>
      <option value="💍 首饰">💍 首饰</option>
      <option value="🧴 护肤">🧴 护肤</option>
      <option value="💄 彩妆">💄 彩妆</option>
      <option value="🪄 工具仪器">🪄 工具仪器</option>
      <option value="✨ 其他">✨ 其他</option>
    </select>
  </div>

  <div class="field"><label>品牌</label><input id="f-brand" placeholder="如 The Row"></div>
  <div class="field"><label>单品名称</label><input id="f-name" placeholder="如 Eglitta 白色宽腿牛仔裤"></div>
  <div class="field-row">
    <div class="field"><label>颜色</label><input id="f-color" placeholder="如 白色"></div>
    <div class="field"><label>尺码</label><input id="f-size" placeholder="如 S / 25"></div>
  </div>
  <div class="field"><label>材质</label><input id="f-material" placeholder="如 100% 棉"></div>
  <div class="field"><label>洗涤保养</label><input id="f-care" placeholder="如 干洗"></div>
  <div class="field-row">
    <div class="field"><label>购买渠道</label><input id="f-where" placeholder="如 官网 / Mytheresa"></div>
    <div class="field"><label>价格（¥）</label><input id="f-price" placeholder="如 ¥12,000"></div>
  </div>
  <div class="field" id="f-link-row">
    <label>链接</label><input id="f-link" placeholder="购买链接（可选）" type="url">
  </div>
  <div class="field"><label>购买时间</label><input type="date" id="f-date"></div>
  <div class="field"><label>适合场合</label><input id="f-occasion" placeholder="如 日常、正式"></div>
  <div class="field"><label>备注 / 搭配建议</label><textarea id="f-notes" placeholder="保养心得、搭配建议、种草来源..."></textarea></div>

  <div class="btn-row">
    <button class="btn-cancel" onclick="closeAdd()">取消</button>
    <button class="btn-save" onclick="saveItem()">保存</button>
  </div>
</div>
</div>

<!-- Detail sheet -->
<div class="detail-overlay" id="detailModal">
<div class="detail-sheet">
  <div id="d-img-official" class="detail-img"></div>
  <div id="d-img-outfit" style="display:none;width:100%;aspect-ratio:3/4;overflow:hidden;background:#f5f5f5;">
    <img id="d-outfit-img" style="width:100%;height:100%;object-fit:cover;">
  </div>
  <div class="img-tabs" id="d-img-tabs" style="display:none;">
    <button id="d-tab-official" class="img-tab-btn img-tab-active" onclick="switchImgTab('official')">官方图</button>
    <button id="d-tab-outfit" class="img-tab-btn img-tab-inactive" onclick="switchImgTab('outfit')">上身图</button>
  </div>
  <div class="detail-body">
    <div class="detail-top">
      <div><div class="d-brand" id="d-brand"></div><div class="d-name" id="d-name"></div></div>
      <button class="close-x" onclick="closeDetail()">✕</button>
    </div>
    <div id="d-rows"></div>
    <div class="d-notes" id="d-notes" style="display:none"></div>
    <div class="detail-actions">
      <button class="edit-btn" onclick="openEdit()">编辑</button>
      <button class="del-btn" onclick="deleteItem()">删除</button>
    </div>
    <button class="move-btn" id="move-btn" style="display:none" onclick="moveToWardrobe()">✅ 已购入，移入衣橱</button>
    <button class="repurchase-btn" id="repurchase-wishlist-btn" style="display:none" onclick="addRepurchaseToWishlist()">⭐ 加入心愿单补货</button>

let items=JSON.parse(localStorage.getItem('jwardrobe6')||'null')||SEED;

let activeSub={wardrobe:'全部',beauty:'全部',wishlist:'全部'};

let viewingId=null;

let currentOutfitImg='';
let addingType='wardrobe';
let beautyStatusFilter='current';
let wishlistPriorityFilter='all';

function setBeautyStatus(s){
  beautyStatusFilter=s;
  ['current','done','all'].forEach(k=>{
    const el=document.getElementById('sb-'+k);
    if(el) el.className='status-btn'+(k===s?' active':'');
  });
  render();
}

function setWishlistPriority(p){
  wishlistPriorityFilter=p;
  ['all','高','中','低'].forEach(k=>{
    const el=document.getElementById('wl-'+k);
    if(el) el.className='status-btn'+(k===p?' active':'');
  });
  render();
}

function save(){localStorage.setItem('jwardrobe6',JSON.stringify(items));}

function switchMain(tab){
  currentMain=tab;
  ['wardrobe','beauty','wishlist'].forEach(t=>{
    document.getElementById('section-'+t).style.display=t===tab?'':'none';
    document.getElementById('tab-'+t).className='main-tab'+(t===tab?' active':'');
  });
  render();
}

function allCats(type){
  if(type==='beauty') return['全部',...BEAUTY_CATS.filter(c=>items.some(i=>i.type==='beauty'&&i.bigcat===c))];
  const used=[...new Set(items.filter(i=>i.type===type).map(i=>i.bigcat))];
  return['全部',...used];
}
function subcatsFor(type,bigcat){
  if(!bigcat||bigcat==='全部') return[];
  const used=[...new Set(items.filter(i=>i.type===type&&i.bigcat===bigcat).map(i=>i.subcat).filter(Boolean))];
  return used.length>1?['全部',...used]:[];
}

function filtered(type){
  const sidMap={wardrobe:'search-w',beauty:'search-b',wishlist:'search-wl'};
  const q=document.getElementById(sidMap[type]).value.toLowerCase();
  return items.filter(i=>{
    if(i.type!==type) return false;
    if(type==='beauty'){
      if(beautyStatusFilter==='current'&&i.status==='done') return false;
      if(beautyStatusFilter==='done'&&i.status!=='done') return false;
    }
    if(type==='wishlist'&&wishlistPriorityFilter!=='all'){
      if(i.priority!==wishlistPriorityFilter) return false;
    }
    const matchTab=activeTab[type]==='全部'||i.bigcat===activeTab[type];
    const matchSub=activeSub[type]==='全部'||i.subcat===activeSub[type];
    const matchQ=!q||[i.brand,i.name,i.color,i.material,i.bigcat,i.subcat,i.cattag,i.occasion,i.notes].join(' ').toLowerCase().includes(q);
    return matchTab&&matchSub&&matchQ;
  });
}

function render(){
  ['wardrobe','beauty','wishlist'].forEach(type=>{
    const sfxMap={wardrobe:'w',beauty:'b',wishlist:'wl'};
    const sfx=sfxMap[type];

    // Wishlist uses priority filter instead of category tabs
    if(type==='wishlist'){
      const list=filtered(type);
      document.getElementById('count-wl').textContent=`${list.length} 件`;
      document.getElementById('grid-wl').innerHTML=list.length?list.map(it=>`
        <div class="card" onclick="openDetail(${it.id})">
          <div class="card-img">${it.img?`<img src="${it.img}">`:`<span>${EMOJI_MAP[it.bigcat]||'✨'}</span>`}</div>
          <div class="wish-badge">${it.priority==='高'?'🔴':it.priority==='中'?'🟡':'⚪'}</div>
          <div class="card-body">
            <div class="card-brand">${it.brand}</div>
            <div class="card-name">${it.name}</div>
            <div class="card-meta">${it.color||''}</div>
            ${it.price?`<div style="font-size:11px;color:#c0397a;margin-top:4px;font-weight:500;">${it.price}</div>`:''}
            ${it.cattag?`<span class="badge b-other">${it.cattag}</span>`:''}
          </div>
        </div>`).join(''):'<div class="empty">暂无心愿单</div>';
      return;
    }

    document.getElementById('tabs-'+sfx).innerHTML=allCats(type).map(c=>
      `<button class="tab${c===activeTab[type]?' active':''}" onclick="setTab('${type}','${c}')">${c}</button>`
    ).join('');
    const subs=subcatsFor(type,activeTab[type]);
    const subScroll=document.getElementById('subcatScroll-'+sfx);
    if(subs.length){
      subScroll.style.display='block';
      document.getElementById('subtabs-'+sfx).innerHTML=subs.map(s=>
        `<button class="subtab${s===activeSub[type]?' active':''}" onclick="setSub('${type}','${s}')">${s}</button>`
      ).join('');
    } else subScroll.style.display='none';
    const list=filtered(type);
    document.getElementById('count-'+sfx).textContent=`${list.length} 件`;
    document.getElementById('grid-'+sfx).innerHTML=list.length?list.map(it=>{
      const statusBadge=it.type==='beauty'?`<span class="${it.status==='done'?'s-done':it.status==='stock'?'s-stock':'s-using'}">${it.status==='done'?(it.repurchase==='yes'?'⭐已用完':it.repurchase==='no'?'❌已用完':'已用完'):it.status==='stock'?'库存中':'使用中'}</span>`:'';
      return`<div class="card" onclick="openDetail(${it.id})">
        <div class="card-img">${it.img?`<img src="${it.img}">`:`<span>${EMOJI_MAP[it.bigcat]||'✨'}</span>`}</div>
        <div class="card-body">
          <div class="card-brand">${it.brand}</div>
          <div class="card-name">${it.name}</div>
          <div class="card-meta">${[it.color,it.subcat].filter(Boolean).join(' · ')}</div>
          ${it.price?`<div style="font-size:11px;color:#c0397a;margin-top:4px;font-weight:500;">${it.price}</div>`:''}
          ${statusBadge||`<span class="badge ${BADGE_MAP[it.bigcat]||'b-other'}">${it.bigcat}</span>`}
        </div>
      </div>`;
    }).join(''):'<div class="empty">暂无内容</div>';
  });
}

function setTab(type,c){activeTab[type]=c;activeSub[type]='全部';render();}
function setSub(type,s){activeSub[type]=s;render();}
function updateSubcat(){
  const big=document.getElementById('f-bigcat').value;
  const sub=document.getElementById('f-subcat');
  sub.innerHTML=(SUBCATS[big]||['其他']).map(s=>`<option>${s}</option>`).join('');
}

function handleImg(e,previewId,type){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    if(type==='official') currentImg=ev.target.result;
    else currentOutfitImg=ev.target.result;
    const prev=document.getElementById(previewId);
    prev.src=ev.target.result; prev.style.display='block';
  };
  r.readAsDataURL(f);
}

async function callAI(b64,mediaType,prompt){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mediaType,data:b64}},{type:'text',text:prompt}]}]})
  });
  const data=await resp.json();
  return data.content.map(c=>c.text||'').join('');
}

async function callAIText(prompt){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,messages:[{role:'user',content:prompt}],tools:[{type:'web_search_20250305',name:'web_search'}]})
  });
  const data=await resp.json();
  return data.content.map(c=>c.text||'').filter(Boolean).join('');
}

async function scanBrand(e){
  const f=e.target.files[0]; if(!f) return;
  const loading=document.getElementById('aiLoading');
  loading.textContent='⏳ AI识别中，请稍候...'; loading.style.display='block';
  try{
    const r=new FileReader();
    r.onload=async ev=>{
      const b64=ev.target.result.split(',')[1];
      const text=await callAI(b64,f.type,`这张图片可能是：1）商品截图（电商页面/小红书/Instagram/网页截图）或 2）实物照片。
请识别并只返回JSON，不要其他文字：
{"brand":"品牌名","name":"商品名称或款式描述","color":"颜色","price":"价格（人民币，格式¥12,000；如是外币请换算并标注原价）","size":"尺码（如有）","material":"材质（如有）","notes":"其他有用信息（如有）"}
如果是截图，优先读取图中的文字信息。如果是实物照片，根据视觉特征判断。看不出的字段返回空字符串。`);
      try{
        const info=JSON.parse(text.replace(/```json|```/g,'').trim());
        if(info.brand&&!document.getElementById('f-brand').value) document.getElementById('f-brand').value=info.brand;
        if(info.name&&!document.getElementById('f-name').value) document.getElementById('f-name').value=info.name;
        if(info.color&&!document.getElementById('f-color').value) document.getElementById('f-color').value=info.color;
        if(info.price&&!document.getElementById('f-price').value) document.getElementById('f-price').value=info.price;
        if(info.size&&!document.getElementById('f-size').value) document.getElementById('f-size').value=info.size;
        if(info.material&&!document.getElementById('f-material').value) document.getElementById('f-material').value=info.material;
        if(info.notes&&!document.getElementById('f-notes').value) document.getElementById('f-notes').value=info.notes;
      }catch(err){}
      loading.style.display='none';
    };
    r.readAsDataURL(f);
  }catch(err){loading.style.display='none';}
}

async function scanLabel1(e){

async function scanLabel2(e){
  const f=e.target.files[0]; if(!f) return;
  const loading=document.getElementById('aiLoading');
  loading.textContent='⏳ 识别洗涤方式中...'; loading.style.display='block';
  try{
    const r=new FileReader();
    r.onload=async ev=>{

async function queryPrice(){
  const it=items.find(i=>i.id===viewingId); if(!it) return;
  document.getElementById('priceModal').classList.add('open');
  document.getElementById('priceLoading').style.display='block';
  document.getElementById('priceResult').textContent='';
  const query=`${it.brand} ${it.name} ${it.color||''}`.trim();
  try{
    const result=await callAIText(`请帮我查询以下单品在全球各平台的参考零售价格：\n\n单品：${query}\n\n请搜索并列出：国内官网/专柜价、海外官网价（欧洲/美国/日本）、主要电商平台价、二手市场参考价，并换算成人民币，最后给出购买建议（哪里买最划算）。格式清晰易读。`);
    document.getElementById('priceLoading').style.display='none';
    document.getElementById('priceResult').textContent=result||'暂未找到相关价格信息。';
  }catch(err){
    document.getElementById('priceLoading').style.display='none';
    document.getElementById('priceResult').textContent='查询失败，请稍后再试。';
  }
}

function openAdd(type){
  addingType=type;
  editingId=null; currentImg=''; currentOutfitImg='';
  document.getElementById('modal-title').textContent=type==='wishlist'?'添加心愿单':type==='beauty'?'添加美妆护肤':'添加单品';
  document.getElementById('f-priority-row').style.display=type==='wishlist'?'':'none';
  document.getElementById('f-cattag-row').style.display=type==='wishlist'?'':'none';
  document.getElementById('f-link-row').style.display=type==='wishlist'?'':'none';
  document.getElementById('f-status-row').style.display=type==='beauty'?'':'none';
  document.getElementById('f-repurchase-row').style.display=type==='beauty'?'':'none';
  // Hide bigcat/subcat for wishlist
  const catRow=document.querySelector('.field-row:has(#f-bigcat)');
  if(catRow) catRow.style.display=type==='wishlist'?'none':'';
  ['brand','name','color','size','material','care','where','price','date','occasion','notes','link'].forEach(f=>{
    const el=document.getElementById('f-'+f); if(el) el.value='';
  });
  if(document.getElementById('f-status')) document.getElementById('f-status').value='using';
  if(document.getElementById('f-repurchase')) document.getElementById('f-repurchase').value='';
  if(document.getElementById('f-priority')) document.getElementById('f-priority').value='高';
  if(document.getElementById('f-cattag')) document.getElementById('f-cattag').value='👗 衣服';
  const bigcatEl=document.getElementById('f-bigcat');
  if(type==='beauty'){
    bigcatEl.innerHTML=BEAUTY_CATS.map(c=>`<option value="${c}">${c}</option>`).join('');
  } else {
    bigcatEl.innerHTML=['大衣/皮草','外套','上装','下装','裙子','鞋子','配饰','首饰','内衣/睡衣','运动','其他'].map(c=>`<option value="${c}">${c}</option>`).join('');
  }
  document.getElementById('imgPreview').style.display='none';
  document.getElementById('outfitPreview').style.display='none';
  updateSubcat();
  document.getElementById('addModal').classList.add('open');
}
function closeAdd(){document.getElementById('addModal').classList.remove('open');}

function saveItem(){
  const g=id=>{const el=document.getElementById('f-'+id); return el?el.value.trim():'';};
  if(!g('brand')&&!g('name')) return;
  const item={
    id:editingId||nextId++,
    type:editingId?items.find(i=>i.id===editingId).type:addingType,
    priority:g('priority')||'中',
    status:g('status')||'using',
    repurchase:g('repurchase')||'',
    cattag:g('cattag')||'',
    bigcat:addingType==='wishlist'?'其他':document.getElementById('f-bigcat').value,
    subcat:addingType==='wishlist'?'':document.getElementById('f-subcat').value,
    brand:g('brand'),name:g('name'),color:g('color'),size:g('size'),
    material:g('material'),care:g('care'),where:g('where'),price:g('price'),
    date:g('date'),occasion:g('occasion'),notes:g('notes'),
    link:g('link'),img:currentImg,outfitImg:currentOutfitImg
  };
  items=editingId?items.map(i=>i.id===editingId?item:i):[...items,item];
  save();closeAdd();render();
}

function switchImgTab(tab){
  const isOff=tab==='official';
  document.getElementById('d-img-official').style.display=isOff?'':'none';
  document.getElementById('d-img-outfit').style.display=isOff?'none':'';
  document.getElementById('d-tab-official').className='img-tab-btn '+(isOff?'img-tab-active':'img-tab-inactive');
  document.getElementById('d-tab-outfit').className='img-tab-btn '+(isOff?'img-tab-inactive':'img-tab-active');
}

function openDetail(id){
  const it=items.find(i=>i.id===id); if(!it) return;
  viewingId=id;
  const di=document.getElementById('d-img-official');
  di.innerHTML=it.img?`<img src="${it.img}" style="width:100%;height:100%;object-fit:cover;">`:`<span>${EMOJI_MAP[it.bigcat]||'✨'}</span>`;
  const oi=document.getElementById('d-img-outfit');
  const oimg=document.getElementById('d-outfit-img');
  if(it.outfitImg){oimg.src=it.outfitImg;oi.style.display='';}else{oi.style.display='none';}
  document.getElementById('d-img-tabs').style.display=it.outfitImg?'':'none';
  switchImgTab('official');
  document.getElementById('d-brand').textContent=it.brand;
  document.getElementById('d-name').textContent=it.name;
  const statusLabel=it.type==='beauty'?{using:'🟢 使用中',stock:'🟡 库存中',done:'🔴 已用完'}[it.status||'using']:'';
  const repurchaseLabel=it.repurchase==='yes'?'⭐ 会回购':it.repurchase==='no'?'❌ 不回购':'';
  const rows=[
    ['类别',it.bigcat+(it.subcat?' · '+it.subcat:'')],
    ['颜色',it.color],['尺码',it.size],['材质',it.material],['洗涤',it.care],
    ['购买渠道',it.where],['价格',it.price],['购买时间',it.date],['适合场合',it.occasion],
    it.type==='beauty'&&statusLabel?['状态',statusLabel]:null,
    it.type==='beauty'&&repurchaseLabel?['回购',repurchaseLabel]:null,
    it.link?['链接',`<a href="${it.link}" style="color:#c0397a;">查看链接</a>`]:null,
    it.priority&&it.type==='wishlist'?['优先级',it.priority==='高'?'🔴 必买':it.priority==='中'?'🟡 很想要':'⚪ 随缘']:null,
  ].filter(Boolean).filter(r=>r[1]);
  document.getElementById('d-rows').innerHTML=rows.map(r=>
    `<div class="d-row"><span class="d-label">${r[0]}</span><span class="d-val">${r[1]}</span></div>`).join('');
  const n=document.getElementById('d-notes');
  n.style.display=it.notes?'block':'none'; n.textContent=it.notes||'';
  document.getElementById('move-btn').style.display=it.type==='wishlist'?'block':'none';
  // Show repurchase-to-wishlist button for beauty items that are done and marked repurchase=yes
  const rpBtn=document.getElementById('repurchase-wishlist-btn');
  if(rpBtn) rpBtn.style.display=(it.type==='beauty'&&it.status==='done'&&it.repurchase==='yes')?'block':'none';
  document.getElementById('detailModal').classList.add('open');
}
function closeDetail(){document.getElementById('detailModal').classList.remove('open');}

function openEdit(){
  const it=items.find(i=>i.id===viewingId); if(!it) return;
  closeDetail();
  addingType=it.type;
  editingId=viewingId; currentImg=it.img||''; currentOutfitImg=it.outfitImg||'';
  document.getElementById('modal-title').textContent='编辑单品';
  document.getElementById('f-priority-row').style.display=it.type==='wishlist'?'':'none';
  document.getElementById('f-link-row').style.display=it.type==='wishlist'?'':'none';
  document.getElementById('f-status-row').style.display=it.type==='beauty'?'':'none';
  document.getElementById('f-repurchase-row').style.display=it.type==='beauty'?'':'none';
  const bigcatEl=document.getElementById('f-bigcat');
  if(it.type==='beauty'){
    bigcatEl.innerHTML=BEAUTY_CATS.map(c=>`<option value="${c}">${c}</option>`).join('');
  } else {
    bigcatEl.innerHTML=['大衣/皮草','外套','上装','下装','裙子','鞋子','配饰','首饰','内衣/睡衣','运动','其他'].map(c=>`<option value="${c}">${c}</option>`).join('');
  }
  document.getElementById('f-bigcat').value=it.bigcat;
  updateSubcat();
  document.getElementById('f-subcat').value=it.subcat;
  ['brand','name','color','size','material','care','where','price','date','occasion','notes','link'].forEach(f=>{
    const el=document.getElementById('f-'+f); if(el) el.value=it[f]||'';
  });
  if(document.getElementById('f-priority')) document.getElementById('f-priority').value=it.priority||'中';
  if(document.getElementById('f-status')) document.getElementById('f-status').value=it.status||'using';
  if(document.getElementById('f-repurchase')) document.getElementById('f-repurchase').value=it.repurchase||'';
  const prev=document.getElementById('imgPreview');
  if(it.img){prev.src=it.img;prev.style.display='block';}else{prev.style.display='none';}
  const oprev=document.getElementById('outfitPreview');
  if(it.outfitImg){oprev.src=it.outfitImg;oprev.style.display='block';}else{oprev.style.display='none';}
  document.getElementById('addModal').classList.add('open');
}

function addRepurchaseToWishlist(){
  const it=items.find(i=>i.id===viewingId); if(!it) return;
  const wish={
    id:nextId++, type:'wishlist', priority:'高',
    bigcat:it.bigcat, subcat:it.subcat,
    brand:it.brand, name:it.name, color:it.color, size:it.size,
    material:it.material, care:it.care, where:it.where, price:it.price,
    date:'', occasion:it.occasion, notes:'回购补货', link:'', img:it.img, outfitImg:''
  };
  items.push(wish);
  save(); closeDetail();
  switchMain('wishlist');
  render();
  alert('已加入心愿单！');
}

function moveToWardrobe(){
  const it=items.find(i=>i.id===viewingId); if(!it) return;
  it.type='wardrobe';
  it.date=new Date().toISOString().split('T')[0];
  save(); closeDetail();
  switchMain('wardrobe');
  render();
}

function deleteItem(){
  if(!confirm('确定删除？')) return;
  items=items.filter(i=>i.id!==viewingId);
  save();closeDetail();render();
}

updateSubcat();
render();
</script>
